# This code is inspired by alex ci: https://github.com/haskell/alex/blob/master/.github/workflows/ci.yml
name: wyvern-ci
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  main:
    name: GHC ${{ matrix.ghc }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ghc:
          - "9.8.4"
        include:
          - ghc: "9.8.4"
            os:  macos-latest
          - ghc: "9.8.4"
            os:  windows-latest

    steps:
    - uses: actions/checkout@v6

    - uses: haskell-actions/setup@v2
      id: setup
      with:
        ghc-version: ${{ matrix.ghc }}
        cabal-version: "latest"
        cabal-update: true

    - uses: actions/cache@v5
      name: Cache cabal stuff
      with:
        path: |
          ${{ steps.setup.outputs.cabal-store }}
          dist-newstyle
        key: ${{ runner.os }}-${{ matrix.ghc }}

    - name: Cabal version
      run: cabal --version

    - name: Install alex & happy
      run: cabal install alex happy

    - name: Build
      run: cabal build all --enable-benchmarks

    - name: Run tests
      run: cabal test all --enable-tests

    - name: Cabal check
      run: cabal check

    - name: Generate source distribution
      run: cabal sdist --ignore-project --output-directory .

    - name: Test source distribution build
      run: |
        mkdir -p tmp-dist
        cd tmp-dist
        cabal get ../wyvern-diagrams-*.tar.gz
        cd wyvern-diagrams-*/
        cabal build all --enable-benchmarks
        cabal test all --enable-tests